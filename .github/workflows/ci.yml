name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        index: [0, 1]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: loco
          POSTGRES_PASSWORD: loco
          POSTGRES_DB: sandbox_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # moon ci が git 履歴で変更検出するために必要

      - uses: moonrepo/setup-toolchain@v0
        with:
          cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            apps/web/pnpm-lock.yaml
            apps/agent/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/server

      - name: Install web dependencies
        run: pnpm install
        working-directory: apps/web

      - name: Install agent dependencies
        run: pnpm install
        working-directory: apps/agent

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run Moon CI
        run: moon ci --job ${{ matrix.index }} --job-total 2
        env:
          DATABASE_URL: postgres://loco:loco@localhost:5432/sandbox_test

      - uses: moonrepo/run-report-action@v1
        if: success() || failure()
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.index }}
          path: apps/web/playwright-report/
          retention-days: 7
