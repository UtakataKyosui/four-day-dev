$schema: 'https://moonrepo.dev/schemas/project.json'

language: typescript

tasks:
  dev:
    command: pnpm dev
    options:
      runInCI: false

  build:
    command: pnpm build
    outputs:
      - dist

  start:
    command: pnpm start
    deps:
      - build
    options:
      runInCI: false

  lint:
    command: pnpm lint

  typecheck:
    command: pnpm typecheck
