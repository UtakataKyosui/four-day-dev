$schema: 'https://moonrepo.dev/schemas/project.json'

language: typescript

tasks:
  dev:
    command: pnpm dev
    options:
      runInCI: false

  build:
    command: pnpm build
    inputs:
      - src/**/*.ts
      - tsconfig.json
      - package.json
    outputs:
      - dist

  start:
    command: pnpm start
    deps:
      - build
    options:
      runInCI: false

  lint:
    command: pnpm lint
    inputs:
      - src/**/*.ts
      - biome.json
      - "@root(biome.json)"

  typecheck:
    command: pnpm typecheck
    inputs:
      - src/**/*.ts
      - tsconfig.json
