$schema: 'https://moonrepo.dev/schemas/project.json'

language: typescript

tasks:
  build:
    command: pnpm build
    outputs:
      - .next

  dev:
    command: pnpm dev
    options:
      runInCI: false

  lint:
    command: pnpm lint

  typecheck:
    command: pnpm typecheck

  format:
    command: pnpm format
    options:
      runInCI: false

  test-e2e:
    command: pnpm test:e2e
    inputs:
      - e2e/**/*
      - playwright.config.ts
      - app/**/*.{ts,tsx}
      - components/**/*.{ts,tsx}
      - lib/**/*.ts
    env:
      CI: 'true'
