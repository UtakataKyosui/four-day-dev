$schema: 'https://moonrepo.dev/schemas/project.json'

language: typescript

tasks:
  build:
    command: pnpm build
    inputs:
      - app/**/*.{ts,tsx}
      - components/**/*.{ts,tsx}
      - lib/**/*.ts
      - next.config.*
      - postcss.config.*
      - package.json
      - tsconfig.json
    outputs:
      - .next

  dev:
    command: pnpm dev
    options:
      runInCI: false

  lint:
    command: pnpm lint
    inputs:
      - app/**/*.{ts,tsx}
      - components/**/*.{ts,tsx}
      - lib/**/*.ts
      - biome.json
      - "@root(biome.json)"

  typecheck:
    command: pnpm typecheck
    inputs:
      - app/**/*.{ts,tsx}
      - components/**/*.{ts,tsx}
      - lib/**/*.ts
      - tsconfig.json
      - next-env.d.ts

  format:
    command: pnpm format
    inputs:
      - app/**/*.{ts,tsx}
      - components/**/*.{ts,tsx}
      - lib/**/*.ts
      - biome.json
      - "@root(biome.json)"
    options:
      runInCI: false

  test-e2e:
    command: pnpm test:e2e
    inputs:
      - e2e/**/*
      - playwright.config.ts
      - app/**/*.{ts,tsx}
      - components/**/*.{ts,tsx}
      - lib/**/*.ts
    env:
      CI: 'true'
